[project]
name = "rag-common"
version = "0.1.0"
description = "Shared foundation package for the RAG platform — logging, config, exceptions, schemas, observability, and testing utilities"
requires-python = ">=3.11"
dependencies = [
    "structlog>=24.0",
    "pydantic-settings>=2.0",
    "pydantic>=2.0",
    "haystack-ai>=2.30",
    "httpx>=0.25",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
]

[tool.setuptools.packages.find]
where = ["src"]
